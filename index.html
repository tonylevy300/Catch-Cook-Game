<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Catch Cook">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Catch Cook: 2D Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-yellow: #FFE600;
            --sky-blue: #4facfe;
            --sun-glow: #fff7ad;
            --hill-light: #7ed957;
            --hill-mid: #4caf50;
            --hill-dark: #2e7d32;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%; 
            position: fixed; 
            background-color: #000;
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none; 
        }

        .safe-pt { padding-top: max(1rem, env(safe-area-inset-top)) !important; }
        /* Increased bottom safe area to clear the iPhone Home Indicator shown in screenshot */
        .safe-pb { padding-bottom: max(2.5rem, env(safe-area-inset-bottom)) !important; }
        .safe-pl { padding-left: max(2.5rem, env(safe-area-inset-left)) !important; }
        .safe-pr { padding-right: max(2.5rem, env(safe-area-inset-right)) !important; }

        .font-brand { font-family: 'Bebas Neue', sans-serif; }
        .text-brand { color: var(--brand-yellow); }
        .bg-brand { background-color: var(--brand-yellow); }
        
        .menu-wrapper {
            background: radial-gradient(circle at 50% 100%, var(--sun-glow) 0%, var(--sky-blue) 100%);
            overflow: hidden;
            z-index: 50;
        }

        .sunburst {
            position: absolute;
            top: 100%;
            left: 50%;
            width: 300vmax;
            height: 300vmax;
            background: repeating-conic-gradient(from 0deg, rgba(255, 255, 255, 0.2) 0deg 12deg, transparent 12deg 24deg);
            transform: translate(-50%, -50%);
            animation: rotateSun 100s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes rotateSun {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .hills-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            z-index: 2;
            pointer-events: none;
            transition: height 0.3s;
        }

        .hill {
            position: absolute;
            bottom: 0;
            width: 130%;
            height: 100%;
            border-top-left-radius: 50% 100%;
            border-top-right-radius: 50% 100%;
        }

        .hill-1 { background: linear-gradient(to bottom, var(--hill-light), var(--hill-mid)); left: -15%; z-index: 3; }
        .hill-2 { background: linear-gradient(to bottom, var(--hill-mid), var(--hill-dark)); left: -5%; height: 85%; opacity: 0.9; z-index: 2; }
        .hill-3 { background: #1b5e20; left: -25%; height: 70%; opacity: 0.7; z-index: 1; }

        .card-expedition {
            background: white;
            border: 5px solid var(--brand-yellow);
            border-radius: 2.5rem;
            box-shadow: 0 12px 0 rgba(0,0,0,0.1), 0 20px 40px rgba(0,0,0,0.25);
            transition: transform 0.1s;
            z-index: 10;
        }
        .card-expedition:active { transform: translateY(6px); box-shadow: 0 6px 0 rgba(0,0,0,0.1); }

        .logo-main { filter: drop-shadow(0 0 25px rgba(255, 230, 0, 0.6)); z-index: 10; }

        .hud-tab {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            border: 1.5px solid rgba(255, 230, 0, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .joystick-base { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 230, 0, 0.2); backdrop-filter: blur(5px); }
        .joystick-knob { background: var(--brand-yellow); box-shadow: 0 0 20px var(--brand-yellow); }

        .action-btn {
            background: radial-gradient(circle, #FFE600 0%, #b3a100 100%);
            box-shadow: 0 8px 0 #807300, 0 15px 30px rgba(0,0,0,0.4);
            border: 3px solid #000;
            touch-action: none;
            transition: background 0.2s;
        }
        .action-btn.warning {
            background: radial-gradient(circle, #ff4d4d 0%, #cc0000 100%);
            box-shadow: 0 8px 0 #800000, 0 15px 30px rgba(255,0,0,0.4);
        }
        .action-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #807300; }
        .action-btn.warning:active { box-shadow: 0 3px 0 #800000; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.2s infinite; }
        
        @keyframes pulse-red {
            0%, 100% { background-color: #ef4444; }
            50% { background-color: #991b1b; }
        }
        .bg-danger { animation: pulse-red 0.5s infinite; }

        #rotate-overlay { 
            display: none; 
            z-index: 1000;
            background: #09090b;
        }
        
        @media screen and (orientation: portrait) { 
            #rotate-overlay { display: flex; } 
        }

        @media (max-height: 450px) {
            .hills-container { height: 22vh; }
            .logo-main { max-height: 22vh !important; }
            .start-title { font-size: 1.5rem !important; margin-top: 0.25rem !important; margin-bottom: 0.25rem !important; }
            .mb-6 { margin-bottom: 0.5rem !important; }
            
            .card-expedition { max-width: 130px !important; padding: 0.5rem !important; border-width: 3px !important; border-radius: 1.2rem !important; }
            .card-expedition span:first-child { font-size: 3rem !important; margin-bottom: 0 !important; }
            .card-expedition span:nth-child(2) { font-size: 1.8rem !important; }
            .card-expedition span:last-child { display: none; } 
            
            #joystick-zone { width: 80px !important; height: 80px !important; }
            #action-btn { width: 80px !important; height: 80px !important; }
            #action-icon { font-size: 2.5rem !important; }
            .pb-12 { padding-bottom: 1rem !important; }
            .px-16 { padding-left: 2rem !important; padding-right: 2rem !important; }
            
            .hud-tab { transform: scale(0.65) !important; transform-origin: top; }
            
            /* Modal Screen Squish for Landscape Tabs */
            #game-over-title { font-size: 3.5rem !important; margin-bottom: 0.5rem !important; }
            #game-over-screen > div.bg-zinc-900 { padding: 1rem !important; margin-bottom: 0.5rem !important; width: 180px !important; border-radius: 1.5rem !important; }
            #final-score { font-size: 5rem !important; }
            #restart-btn, #menu-btn { padding: 0.5rem !important; font-size: 1.5rem !important; border-radius: 1rem !important; }
            
            #instructions-screen > div { padding: 1rem !important; border-radius: 1.5rem !important; }
            #inst-title { font-size: 2rem !important; margin-bottom: 0.5rem !important; }
            #inst-text { margin-bottom: 0.5rem !important; padding: 0.75rem !important; font-size: 0.85rem !important; line-height: 1.25 !important; }
            #inst-start-btn { padding: 0.5rem !important; font-size: 1.5rem !important; border-radius: 1rem !important; }
            
            #pause-screen > h1 { font-size: 4rem !important; margin-bottom: 1rem !important; }
            #resume-btn { padding: 0.75rem !important; font-size: 2rem !important; border-radius: 1rem !important;}
            #pause-menu-btn { padding: 0.75rem !important; font-size: 1.5rem !important; border-radius: 1rem !important;}
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

    <div id="rotate-overlay" class="fixed inset-0 flex-col items-center justify-center text-center p-8 pointer-events-auto">
        <div class="animate-bounce text-brand text-7xl mb-6">🔄</div>
        <h1 class="font-brand text-5xl text-white mb-2 tracking-widest uppercase">ROTATE DEVICE</h1>
        <p class="font-sans text-zinc-500 text-lg max-w-sm">Please flip your phone sideways to start the expedition!</p>
    </div>

    <div id="game-container" class="absolute inset-0 w-full bg-black overflow-hidden" style="height: 100%;">
        <canvas id="gameCanvas" class="block w-full h-full absolute inset-0 z-0"></canvas>

        <div id="hud" class="hidden absolute inset-0 z-10 pointer-events-none">
            <div class="absolute top-0 left-0 w-full safe-pt safe-pl safe-pr flex justify-between items-start pointer-events-none">
                <div class="pointer-events-auto transform origin-top-left scale-[0.75] md:scale-95 flex items-center hud-tab rounded-full pr-8 pl-2 py-2">
                    <img src="Catch Cook Logo 2.png" alt="" class="w-14 h-12 object-contain logo-main" onerror="this.style.display='none'; document.getElementById('hud-text').style.display='block';">
                    <span id="hud-text" class="hidden text-brand font-brand text-2xl ml-4">CATCH COOK</span>
                    <div class="ml-4 flex flex-col justify-center border-l border-white/20 pl-4">
                        <span id="score" class="text-brand font-brand text-4xl leading-none">0</span>
                    </div>
                </div>

                <div class="pointer-events-auto transform origin-top-right scale-[0.75] md:scale-95 flex flex-col items-end gap-3">
                    <div class="flex gap-2">
                        <button id="mute-btn" class="bg-black/90 border border-white/10 rounded-full w-12 h-12 flex items-center justify-center text-xl shadow-2xl active:scale-95 transition-transform">🎵</button>
                        <button id="pause-btn" class="bg-black/90 border border-white/10 rounded-full w-12 h-12 flex items-center justify-center text-xl shadow-2xl active:scale-95 transition-transform">⏸</button>
                    </div>
                    <div id="quota-display" class="hud-tab rounded-2xl px-6 py-2.5 flex items-center shadow-2xl">
                        <span id="catch-progress" class="text-brand font-brand text-2xl tracking-widest leading-none">0/5</span>
                    </div>
                </div>
            </div>

            <div id="meters-container" class="absolute inset-0 pointer-events-none transition-opacity duration-300">
                <div class="absolute left-0 top-1/2 -translate-y-1/2 ml-16 md:ml-24 h-1/5 w-3 bg-black/50 rounded-full p-0.5 overflow-hidden opacity-80 border border-white/10">
                    <div id="left-meter" class="w-full bg-blue-400 h-full rounded-full transition-all duration-75"></div>
                </div>
                <div class="absolute right-0 top-1/2 -translate-y-1/2 mr-16 md:mr-24 h-1/5 w-3 bg-black/50 rounded-full p-0.5 overflow-hidden opacity-80 border border-white/10">
                    <div id="tension-meter" class="w-full bg-green-400 h-0 rounded-full transition-all duration-75"></div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full safe-pb safe-pl safe-pr pb-12 px-16 flex justify-between items-end pointer-events-auto">
                <div id="joystick-zone" class="w-24 h-24 md:w-40 md:h-40 relative flex justify-center items-center cursor-pointer">
                    <div class="joystick-base w-full h-full rounded-full absolute shadow-2xl"></div>
                    <div id="joystick-knob" class="joystick-knob w-1/2 h-1/2 rounded-full absolute pointer-events-none"></div>
                </div>
                <div id="sys-message" class="absolute bottom-20 left-1/2 transform -translate-x-1/2 font-brand text-2xl tracking-widest text-white drop-shadow-[0_4px_15px_rgba(0,0,0,1)] opacity-0 pointer-events-none text-center w-full uppercase transition-opacity duration-200">Cast!</div>
                <button id="action-btn" class="action-btn w-20 h-20 md:w-36 md:h-36 rounded-full flex items-center justify-center select-none outline-none cursor-pointer">
                    <span id="action-icon" class="text-black text-3xl md:text-6xl drop-shadow-md transition-transform duration-100">🎣</span>
                </button>
            </div>
        </div>

        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center menu-wrapper safe-pt safe-pb overflow-hidden">
            <div class="sunburst"></div>
            <div class="hills-container">
                <div class="hill hill-3"></div>
                <div class="hill hill-2"></div>
                <div class="hill hill-1"></div>
            </div>

            <div class="flex flex-col items-center mb-6 md:mb-12">
                <img src="Catch Cook Logo 2.png" alt="Catch Cook" class="max-h-[35vh] w-auto object-contain logo-main">
                <h1 class="text-black font-brand text-2xl md:text-4xl tracking-[0.4em] mt-2 leading-none opacity-40 uppercase start-title">THE GAME</h1>
            </div>

            <div class="flex flex-row gap-6 md:gap-14 px-4 w-full justify-center items-stretch relative z-20">
                <button id="hunt-btn" class="card-expedition flex-1 max-w-[180px] md:max-w-[260px] p-5 md:p-12 flex flex-col items-center">
                    <span class="text-6xl md:text-8xl mb-3 drop-shadow-lg">🌲</span>
                    <span class="text-black font-brand text-3xl md:text-6xl leading-none">HUNT</span>
                    <span class="text-zinc-400 text-[10px] md:text-xs font-black uppercase tracking-widest mt-2">Expedition</span>
                </button>
                <button id="fish-btn" class="card-expedition flex-1 max-w-[180px] md:max-w-[260px] p-5 md:p-12 flex flex-col items-center">
                    <span class="text-6xl md:text-8xl mb-3 drop-shadow-lg">🌊</span>
                    <span class="text-black font-brand text-3xl md:text-6xl leading-none">FISH</span>
                    <span class="text-zinc-400 text-[10px] md:text-xs font-black uppercase tracking-widest mt-2">Expedition</span>
                </button>
            </div>
        </div>

        <div id="instructions-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-zinc-950/98 z-40 backdrop-blur-3xl safe-pt safe-pb p-4 sm:p-8">
            <div class="bg-zinc-900 border-2 border-brand/30 rounded-[30px] p-6 sm:p-10 text-center max-w-md w-full shadow-2xl">
                <h2 id="inst-title" class="text-brand font-brand text-3xl sm:text-4xl mb-4 uppercase tracking-widest">MISSION</h2>
                <div id="inst-text" class="text-zinc-300 font-sans text-xs sm:text-sm leading-relaxed mb-6 space-y-3 text-left bg-black/60 p-5 rounded-2xl"></div>
                <button id="inst-start-btn" class="w-full bg-brand text-black font-brand text-2xl sm:text-3xl py-3 rounded-xl shadow-[0_8px_0_#b3a100]">BEGIN</button>
            </div>
        </div>

        <div id="game-over-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/98 z-40 safe-pt safe-pb p-4">
            <h1 id="game-over-title" class="text-red-600 font-brand text-6xl sm:text-7xl mb-4 tracking-widest text-center">EXPEDITION OVER</h1>
            <div class="bg-zinc-900 border-2 border-brand/20 rounded-3xl p-6 sm:p-10 text-center mb-6 w-48 sm:w-64 shadow-2xl">
                <p id="final-score" class="text-brand font-brand text-7xl sm:text-8xl leading-none">0</p>
            </div>
            <div class="flex gap-4 w-full max-w-xs justify-center px-4">
                <button id="restart-btn" class="flex-1 bg-brand text-black font-brand text-2xl sm:text-3xl py-3 rounded-xl shadow-[0_6px_0_#b3a100]">AGAIN</button>
                <button id="menu-btn" class="flex-1 bg-zinc-800 text-white font-brand text-xl sm:text-2xl py-3 rounded-xl">MENU</button>
            </div>
        </div>

        <div id="pause-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-50 backdrop-blur-2xl p-4">
            <h1 class="text-brand font-brand text-6xl sm:text-7xl mb-8 tracking-widest uppercase">PAUSED</h1>
            <div class="flex flex-col gap-4 w-full max-w-xs">
                <button id="resume-btn" class="w-full bg-brand text-black font-brand text-3xl sm:text-4xl py-4 rounded-2xl shadow-[0_8px_0_#b3a100]">RESUME</button>
                <button id="pause-menu-btn" class="w-full bg-zinc-800 text-white font-brand text-xl sm:text-2xl py-3 rounded-2xl">QUIT</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        
        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('hud'),
            over: document.getElementById('game-over-screen'),
            instructions: document.getElementById('instructions-screen'),
            pause: document.getElementById('pause-screen')
        };
        const meters = {
            left: document.getElementById('left-meter'),
            tension: document.getElementById('tension-meter')
        };
        const text = {
            score: document.getElementById('score'),
            progress: document.getElementById('catch-progress'), 
            finalScore: document.getElementById('final-score'),
            sysMsg: document.getElementById('sys-message'),
            instText: document.getElementById('inst-text')
        };
        const actionBtnEl = document.getElementById('action-btn');
        const actionIcon = document.getElementById('action-icon');
        const tensionContainer = document.getElementById('tension-meter').parentElement;

        let gameLoop, isPlaying = false, isPaused = false, isCookingPhase = false;
        let gameMode = 'fish', score = 0, frameCount = 0, catches = 0;
        let globalScale = 1;
        
        // Logical Game Dimensions (separated from physical retina canvas)
        let gameWidth = window.innerWidth;
        let gameHeight = window.innerHeight;

        const catchQuota = 5;
        let cookMeterVal = 0, cookDir = 4.5, cookResult = null, cookDelayTimer = 0;
        let moveInput = { x: 0, y: 0 }, isActionPressed = false;
        let waterLine = 0, player = { x: 0, y: 0 }, scope = { x: 0, y: 0 }; 
        
        // --- AUDIO SYSTEM ---
        const bgMusic = new Audio('bgm.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.4; // 40% volume so it isn't too loud
        let isMuted = false;

        let hook = { 
            x: 0, 
            y: 0, 
            depth: 0, 
            state: 'idle', 
            fishOnLine: null,
            isFighting: false,
            fightTimer: 0
        };
        let tension = 0, maxDepth = 400, ammo = 5, maxAmmo = 5;
        let targets = [], particles = [], caughtFishes = [];

        function resizeCanvas() {
            gameWidth = window.innerWidth;
            gameHeight = window.innerHeight;
            
            // Fix layout jumping
            document.body.style.height = `${gameHeight}px`;
            gameContainer.style.height = `${gameHeight}px`;
            
            // HIGH-DPI RETINA SCALING FOR CRISP GRAPHICS
            const dpr = window.devicePixelRatio || 1;
            canvas.width = gameWidth * dpr;
            canvas.height = gameHeight * dpr;
            canvas.style.width = `${gameWidth}px`;
            canvas.style.height = `${gameHeight}px`;
            
            // Tell the canvas to scale all drawing commands to match the Retina display
            ctx.scale(dpr, dpr);
            
            waterLine = gameHeight * 0.45;
            globalScale = Math.min(1.3, Math.max(0.45, gameHeight / 500));
            
            checkOrientation();
            
            if(!isPlaying) {
                player.x = gameWidth / 2; player.y = waterLine;
                scope.x = gameWidth / 2; scope.y = gameHeight / 2;
                drawBackground();
            }
        }

        function checkOrientation() {
            const overlay = document.getElementById('rotate-overlay');
            if (window.innerHeight > window.innerWidth) {
                overlay.style.display = 'flex';
                if (isPlaying) isPaused = true;
            } else {
                overlay.style.display = 'none';
            }
        }

        window.addEventListener('resize', resizeCanvas);

        function updateJoy(clientX, clientY) {
            const joyZone = document.getElementById('joystick-zone');
            const joyKnob = document.getElementById('joystick-knob');
            let rect = joyZone.getBoundingClientRect();
            let startPos = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            let maxDist = rect.width / 2;
            let dx = clientX - startPos.x, dy = clientY - startPos.y;
            let dist = Math.hypot(dx, dy);
            if (dist > maxDist) { dx *= maxDist / dist; dy *= maxDist / dist; }
            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            moveInput.x = dx / maxDist; moveInput.y = dy / maxDist;
        }

        function setAction(state) {
            isActionPressed = state;
            if(state) { handleActionPress(); } else { handleActionRelease(); }
        }

        function showMessage(msg, color = 'text-white') { 
            if(!text.sysMsg) return;
            text.sysMsg.innerText = msg; 
            text.sysMsg.className = `absolute bottom-20 left-1/2 transform -translate-x-1/2 font-brand text-2xl tracking-widest ${color} drop-shadow-[0_4px_15px_rgba(0,0,0,1)] text-center w-full uppercase transition-opacity duration-200`;
            text.sysMsg.style.opacity = '1'; 
            setTimeout(() => { if(text.sysMsg) text.sysMsg.style.opacity = '0'; }, 1500); 
        }

        function checkQuota() {
            catches++; 
            if(text.progress) text.progress.innerText = `${catches}/5`;
            if (catches >= catchQuota) {
                isCookingPhase = true; cookMeterVal = 0; cookResult = null; cookDir = 4.5;
                if(actionIcon) actionIcon.innerText = '🍳'; 
                actionBtnEl.classList.remove('warning');
                showMessage("COOK TIME!", 'text-brand');
            }
        }

        function handleActionPress() {
            if (!isPlaying || isPaused) return;
            if (isCookingPhase) {
                if (cookResult !== null) return;
                if (cookMeterVal > 40 && cookMeterVal < 60) { cookResult = 'perfect'; score += 500; showMessage("PERFECT! +500", 'text-green-400'); }
                else { cookResult = 'ok'; score += 100; showMessage("COOKED! +100", 'text-white'); }
                if(text.score) text.score.innerText = score; 
                cookDelayTimer = frameCount + 100;
                return;
            }
            if (gameMode === 'fish' && hook.state === 'idle') { 
                hook.state = 'sinking'; hook.x = player.x + (35 * globalScale); hook.y = waterLine; hook.depth = 0; tension = 0;
                if(actionIcon) actionIcon.innerText = '⏬'; 
            }
            else if (gameMode === 'hunt' && ammo > 0) {
                ammo--; createParticles(scope.x, scope.y, '#FFCC00');
                for (let j = targets.length - 1; j >= 0; j--) {
                    let t = targets[j];
                    if (Math.hypot(scope.x - t.x, scope.y - t.y) < (55 * globalScale)) {
                        score += t.points; if(text.score) text.score.innerText = score;
                        targets.splice(j, 1); checkQuota(); break;
                    }
                }
                updateMeters();
            }
        }

        function handleActionRelease() { 
            if (gameMode === 'fish' && hook.state === 'sinking') { 
                hook.state = 'waiting'; 
                if(actionIcon) actionIcon.innerText = '🎣'; 
            } 
        }

        function updatePlayer() {
            let speed = 9; 
            if (gameMode === 'fish') { player.x += moveInput.x * speed; player.x = Math.max(50, Math.min(gameWidth - 50, player.x)); }
            else { scope.x += moveInput.x * (speed * 2.5); scope.y += moveInput.y * (speed * 2.5); scope.x = Math.max(0, Math.min(gameWidth, scope.x)); scope.y = Math.max(0, Math.min(gameHeight, scope.y)); }
        }

        function spawnTargets() {
            let rate = Math.max(40, 100 - (score / 15));
            let speedMultiplier = 1 + (catches * 0.30); 

            if (frameCount % Math.floor(rate) === 0) {
                let isLeft = Math.random() > 0.5, startX = isLeft ? -100 : gameWidth + 100;
                if (gameMode === 'fish') {
                    let baseSpeed = 6.5 + Math.random() * 4;
                    let finalSpeed = baseSpeed * speedMultiplier;
                    targets.push({ 
                        x: startX, 
                        y: waterLine + 50 + Math.random() * (gameHeight - waterLine - 100), 
                        vx: isLeft ? finalSpeed : -finalSpeed, 
                        emoji: Math.random() > 0.5 ? '🐟' : '🐡', 
                        points: 15 
                    });
                } else {
                    let baseSpeed = 7.5 + Math.random() * 5;
                    let finalSpeed = baseSpeed * speedMultiplier;
                    targets.push({ 
                        x: startX, 
                        y: gameHeight * 0.82, 
                        vx: isLeft ? finalSpeed : -finalSpeed, 
                        emoji: '🦌', 
                        points: 30 
                    });
                }
            }
        }

        function resetHook() {
            hook.state = 'idle'; 
            hook.fishOnLine = null; 
            hook.isFighting = false;
            tension = 0; 
            actionBtnEl.classList.remove('warning');
            actionIcon.innerText = '🎣'; 
            actionIcon.classList.remove('animate-shake');
        }

        function updateFishing() {
            maxDepth = gameHeight - waterLine - 50;
            if (hook.state === 'sinking') { 
                hook.depth += 7; hook.y = waterLine + hook.depth; tension = 0; 
                if (hook.depth >= maxDepth) { hook.state = 'waiting'; if(actionIcon) actionIcon.innerText = '🎣'; } 
            }
            else if (hook.state === 'waiting') { 
                if (isActionPressed) { 
                    hook.depth -= 18; 
                    hook.y = waterLine + hook.depth; 
                    if (hook.depth <= 0) resetHook(); 
                } 
            }
            else if (hook.state === 'hooked') {
                hook.fightTimer--;
                
                if (hook.fightTimer <= 0) {
                    hook.isFighting = !hook.isFighting;
                    if (hook.isFighting) {
                        hook.fightTimer = 40 + Math.random() * 40; 
                        actionIcon.innerText = '⚠️';
                        actionIcon.classList.add('animate-shake');
                        actionBtnEl.classList.add('warning');
                        createParticles(hook.x, waterLine, '#ffffff'); 
                    } else {
                        hook.fightTimer = 60 + Math.random() * 60; 
                        actionIcon.innerText = '⬆️';
                        actionIcon.classList.remove('animate-shake');
                        actionBtnEl.classList.remove('warning');
                    }
                }

                if (hook.isFighting) {
                    hook.depth += 2;
                    if (isActionPressed) { tension += 3.0; } else { tension -= 0.5; }
                } else {
                    if (isActionPressed) { hook.depth -= 9; tension += 1.2; } else { hook.depth += 1.5; tension -= 2.0; }
                }
                
                hook.y = waterLine + hook.depth; 
                tension = Math.max(0, tension);
                
                if (tension >= 100) { 
                    showMessage("LINE SNAPPED!", "text-red-500"); 
                    resetHook();
                } else if (hook.depth <= 0) {
                    score += hook.fishOnLine.points; if(text.score) text.score.innerText = score;
                    targets.splice(targets.indexOf(hook.fishOnLine), 1);
                    caughtFishes.push({ x: hook.x, y: hook.y, vx: -2, vy: -12, emoji: hook.fishOnLine.emoji, rotation: 0, inBoat: false, offsetX: -35 * globalScale, yOffset: -18 * globalScale });
                    showMessage("CAUGHT!", "text-green-400");
                    resetHook(); 
                    checkQuota();
                }
                updateMeters();
            }

            if (hook.fishOnLine) { 
                hook.fishOnLine.x = hook.x; 
                hook.fishOnLine.y = hook.y + (12 * globalScale); 
            }
        }

        function updateTargets() {
            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i]; if (hook.fishOnLine === t) continue;
                t.x += t.vx; 
                if (gameMode === 'fish' && hook.state === 'waiting' && Math.hypot(hook.x - t.x, hook.y - t.y) < (35 * globalScale)) { 
                    hook.state = 'hooked'; 
                    hook.fishOnLine = t; 
                    hook.isFighting = false;
                    hook.fightTimer = 30; 
                    showMessage("BITE! REEL IT IN!", "text-brand"); 
                }
                if (t.x < -180 || t.x > gameWidth + 180) targets.splice(i, 1);
            }
        }

        function updateCaught() {
            for (let f of caughtFishes) {
                if (!f.inBoat) { f.vy += 0.6; f.x += f.vx; f.y += f.vy; f.rotation += 0.25; if (f.y > player.y - 15 && f.vy > 0) { f.inBoat = true; f.offsetX = -35 * globalScale; f.yOffset = -18 * globalScale; } }
                else { f.x = player.x + f.offsetX; }
            }
        }

        function updateMeters() {
            if (gameMode === 'fish') { 
                if(meters.left) meters.left.style.height = `${100 - (hook.depth / maxDepth) * 100}%`; 
                if(meters.tension) {
                    meters.tension.style.height = `${tension}%`; 
                    if (tension > 85) {
                        meters.tension.className = "w-full bg-danger rounded-full transition-all duration-75";
                        tensionContainer.classList.add('animate-shake');
                    } else if (tension > 50) {
                        meters.tension.className = "w-full bg-yellow-400 h-full rounded-full transition-all duration-75";
                        tensionContainer.classList.remove('animate-shake');
                    } else {
                        meters.tension.className = "w-full bg-green-400 h-full rounded-full transition-all duration-75";
                        tensionContainer.classList.remove('animate-shake');
                    }
                }
            } else { 
                if(meters.left) meters.left.style.height = `${(ammo / maxAmmo) * 100}%`; 
            }
        }

        function drawBackground() {
            ctx.clearRect(0,0,gameWidth, gameHeight);
            if (gameMode === 'fish') {
                let sky = ctx.createLinearGradient(0,0,0,waterLine); sky.addColorStop(0, "#4facfe"); sky.addColorStop(1, "#E0F6FF"); ctx.fillStyle = sky; ctx.fillRect(0,0,gameWidth, waterLine);
                let water = ctx.createLinearGradient(0,waterLine,0,gameHeight); water.addColorStop(0, "#1ca3ec"); water.addColorStop(1, "#032b44"); ctx.fillStyle = water; ctx.fillRect(0, waterLine, gameWidth, gameHeight);
            } else {
                ctx.fillStyle = "#3a5a2e"; ctx.fillRect(0,0,gameWidth, gameHeight); 
                ctx.fillStyle = "#4a3b2c"; ctx.fillRect(0, gameHeight*0.8, gameWidth, gameHeight*0.2);
            }
        }

        function drawPlayer() {
            let s = globalScale;
            if (gameMode === 'fish') {
                ctx.save(); ctx.translate(player.x, player.y);
                ctx.scale(s, s);
                
                ctx.fillStyle = '#222'; ctx.fillRect(-55, -20, 15, 25);
                ctx.fillStyle = '#e65c00'; ctx.beginPath(); ctx.moveTo(-50, -15); ctx.lineTo(40, -15); ctx.quadraticCurveTo(55, -5, 30, 15); ctx.lineTo(-40, 15); ctx.fill();
                ctx.fillStyle = '#8b5a2b'; ctx.fillRect(-52, -15, 95, 4);
                
                ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(0, -60, 13, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#2f4f4f'; ctx.fillRect(-14, -48, 28, 30);
                
                ctx.strokeStyle = '#111'; ctx.lineWidth = 3.5; ctx.beginPath(); ctx.moveTo(8, -35); 
                
                let rodTipX = 65;
                let rodTipY = -80 + (tension * 0.3); 
                ctx.lineTo(rodTipX, rodTipY); ctx.stroke();
                
                if (hook.state !== 'idle') {
                    ctx.strokeStyle = tension > 85 ? 'rgba(255, 50, 50, 0.9)' : 'rgba(255, 255, 255, 0.5)'; 
                    ctx.lineWidth = tension > 85 ? 2.5 : 1; 
                    ctx.beginPath(); 
                    ctx.moveTo(rodTipX, rodTipY); 
                    ctx.lineTo((hook.x - player.x)/s, (hook.y - player.y)/s); 
                    ctx.stroke();
                    
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc((hook.x - player.x)/s, (hook.y - player.y)/s, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            } else {
                ctx.save();
                let grad = ctx.createRadialGradient(scope.x, scope.y, 10, scope.x, scope.y, 300 * s);
                grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.6)');
                ctx.fillStyle = grad; ctx.fillRect(0,0,gameWidth, gameHeight);
                ctx.strokeStyle = '#FFE600'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(scope.x, scope.y, 45 * s, 0, Math.PI*2); ctx.stroke(); 
                ctx.restore();
            }
        }

        function gameRoutine() {
            if (!isPlaying || isPaused) return; frameCount++; 
            
            drawBackground();
            
            if (!isCookingPhase) {
                updatePlayer(); 
                if (gameMode === 'fish') { updateFishing(); updateCaught(); } 
                else { if (ammo < maxAmmo && frameCount % 60 === 0) { ammo++; updateMeters(); } }
                spawnTargets(); updateTargets(); 
            } else {
                if (cookResult === null) { 
                    cookMeterVal += cookDir; 
                    if (cookMeterVal > 100 || cookMeterVal < 0) cookDir *= -1; 
                } 
                else if (frameCount > cookDelayTimer) { endGame(true); return; }
            }
            
            drawGameElements();
            drawPlayer();

            if (isCookingPhase) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, gameWidth, gameHeight);
                drawCookingScene();
            }

            gameLoop = requestAnimationFrame(gameRoutine);
        }

        function drawCookingScene() {
            let cx = gameWidth / 2;
            let cy = gameHeight / 2 - 40;

            ctx.fillStyle = '#FFE600'; 
            ctx.font = 'bold ' + Math.max(24, 50 * globalScale) + 'px "Bebas Neue"'; 
            ctx.textAlign = 'center'; 
            ctx.fillText(gameMode === 'fish' ? "COOK YOUR CATCH!" : "PREPARE THE FEAST!", cx, cy - 80 * globalScale);

            ctx.font = Math.max(20, 35 * globalScale) + 'px Arial';
            let emojis = caughtFishes.map(f => f.emoji).join(' ');
            ctx.fillText(emojis, cx, cy - 30 * globalScale);

            let barW = Math.min(360, gameWidth * 0.7);
            let barH = Math.max(20, 40 * globalScale);
            let barX = cx - barW / 2;
            let barY = cy;

            ctx.fillStyle = '#333'; 
            ctx.fillRect(barX, barY, barW, barH);

            ctx.fillStyle = '#4ade80'; 
            ctx.fillRect(barX + (barW * 0.4), barY, barW * 0.2, barH);

            let cursorX = barX + (cookMeterVal / 100) * barW;
            ctx.fillStyle = '#fff'; 
            ctx.fillRect(cursorX - 5, barY - 10, 10, barH + 20);

            if (cookResult === null) {
                ctx.fillStyle = '#fff'; 
                ctx.font = Math.max(12, 20 * globalScale) + 'px "Open Sans"'; 
                ctx.fillText("TAP BUTTON TO STOP IN THE GREEN!", cx, cy + barH + 40 * globalScale);
            } else {
                ctx.fillStyle = cookResult === 'perfect' ? '#4ade80' : '#facc15'; 
                ctx.font = 'bold ' + Math.max(20, 40 * globalScale) + 'px "Bebas Neue"'; 
                ctx.fillText(cookResult === 'perfect' ? "PERFECT COOK! +500" : "GOOD JOB! +100", cx, cy + barH + 40 * globalScale);
            }
        }

        function drawGameElements() {
            let s = globalScale;
            ctx.font = (48 * s) + 'px Arial'; 
            ctx.textAlign = 'center';

            for (let t of targets) { 
                ctx.save(); 
                
                let offsetX = 0;
                if (hook.fishOnLine === t && hook.isFighting) {
                    offsetX = Math.sin(frameCount * 0.5) * 8 * s; 
                }
                
                ctx.translate(t.x + offsetX, t.y); 
                if (t.vx < 0) ctx.scale(-1, 1); 
                
                if (hook.fishOnLine === t && hook.isFighting) {
                    ctx.font = (24 * s) + 'px Arial';
                    
                    // High-Performance fake shadow
                    ctx.fillStyle = 'black';
                    ctx.fillText('💢', 2, -35 * s + 2);
                    
                    ctx.fillStyle = 'white';
                    ctx.fillText('💢', 0, -35 * s);
                    ctx.font = (48 * s) + 'px Arial';
                }

                // HIGH-PERFORMANCE SHADOW FIX: Replaces expensive shadowBlur
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillText(t.emoji, 2 * s, 3 * s); // Offset shadow text
                
                ctx.fillStyle = '#FFFFFF'; 
                ctx.fillText(t.emoji, 0, 0); // Main color text
                
                ctx.restore(); 
            }
            
            for (let f of caughtFishes) { 
                ctx.save(); 
                ctx.translate(f.x, f.y); 
                
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillText(f.emoji, 2 * s, 3 * s);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(f.emoji, 0, 0); 
                ctx.restore(); 
            }
            
            for (let i = particles.length - 1; i >= 0; i--) { 
                let p = particles[i]; 
                p.x += p.vx; p.y += p.vy; p.life -= 0.05; 
                ctx.fillStyle = p.color; 
                ctx.globalAlpha = Math.max(0, p.life); 
                ctx.fillRect(p.x, p.y, 5 * s, 5 * s); 
                if (p.life <= 0) particles.splice(i, 1); 
            } 
            ctx.globalAlpha = 1;
        }

        function createParticles(x, y, color) { for (let i = 0; i < 15; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color }); }

        function startGame(mode) {
            gameMode = mode; score = 0; catches = 0; frameCount = 0; targets = []; caughtFishes = []; isCookingPhase = false; ammo = maxAmmo;
            resetHook();
            if(text.score) text.score.innerText = '0'; 
            if(text.progress) text.progress.innerText = '0/5'; 
            updateMeters();
            if (mode === 'fish') { 
                text.instText.innerHTML = "<b>HOW TO FISH:</b><br><br>1. Tap button to drop line.<br>2. When bit, HOLD to reel in.<br>3. <b>WATCH THE TENSION!</b> If the fish fights (button turns red/shakes), <b>LET GO</b> or your line will snap!<br>4. Catch 5 to cook."; 
            } 
            else { text.instText.innerHTML = "<b>HOW TO HUNT:</b><br><br>Use the scope to bag 5 bucks on the ground!"; }
            screens.start.classList.add('hidden'); 
            screens.instructions.classList.remove('hidden');
            
            setTimeout(resizeCanvas, 100);
        }

        function endGame(isVictory = false) { 
            isPlaying = false; cancelAnimationFrame(gameLoop); 
            if(text.finalScore) text.finalScore.innerText = score; 
            screens.game.classList.add('hidden'); 
            screens.over.classList.remove('hidden'); 
        }

        function initApp() {
            const joyZone = document.getElementById('joystick-zone');
            if(joyZone) {
                let active = false;
                joyZone.onpointerdown = (e) => { active = true; updateJoy(e.clientX, e.clientY); };
                window.addEventListener('pointermove', (e) => { if (active) updateJoy(e.clientX, e.clientY); });
                window.addEventListener('pointerup', () => { active = false; moveInput = { x: 0, y: 0 }; document.getElementById('joystick-knob').style.transform = `translate(0px, 0px)`; });
            }

            if(actionBtnEl) {
                actionBtnEl.onpointerdown = (e) => { e.preventDefault(); actionBtnEl.setPointerCapture(e.pointerId); setAction(true); };
                actionBtnEl.onpointerup = (e) => { e.preventDefault(); setAction(false); };
                actionBtnEl.onpointercancel = (e) => setAction(false);
            }

            document.getElementById('hunt-btn').onclick = () => startGame('hunt');
            document.getElementById('fish-btn').onclick = () => startGame('fish');
            
            document.getElementById('inst-start-btn').onclick = () => { 
                isPlaying = true; 
                screens.instructions.classList.add('hidden'); 
                screens.game.classList.remove('hidden'); 
                
                // Start music on first player interaction
                if(!isMuted) {
                    bgMusic.play().catch(e => console.log("Audio autoplay blocked:", e));
                }
                
                gameRoutine(); 
            };
            
            document.getElementById('menu-btn').onclick = () => location.reload();
            document.getElementById('restart-btn').onclick = () => startGame(gameMode);
            
            document.getElementById('pause-btn').onclick = () => { 
                isPaused = true; 
                screens.pause.classList.remove('hidden'); 
                bgMusic.pause(); // Pause music when game pauses
            };
            
            document.getElementById('resume-btn').onclick = () => { 
                isPaused = false; 
                screens.pause.classList.add('hidden'); 
                if(!isMuted) bgMusic.play(); // Resume music
                gameLoop = requestAnimationFrame(gameRoutine); 
            };
            
            document.getElementById('pause-menu-btn').onclick = () => location.reload();

            // Mute Toggle Logic
            const muteBtn = document.getElementById('mute-btn');
            if(muteBtn) {
                muteBtn.onclick = () => {
                    isMuted = !isMuted;
                    bgMusic.muted = isMuted;
                    muteBtn.innerText = isMuted ? '🔇' : '🎵';
                };
            }

            resizeCanvas();
        }

        window.onload = initApp;
    </script>
</body>
</html>
